version: '3.8'

services:
  whatsapp-nbn-lookup-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whatsapp-nbn-lookup-bot
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      - IPERIUM_EMAIL
      - IPERIUM_PASSWORD
      - GOOGLE_MAPS_API_KEY
    volumes:
      - analytics:/mnt/apps/yambabroadband/analytics
      - bot-logs:/var/log/yambabroadband
    mem_limit: 256m
    memswap_limit: 256m
    cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    stdin_open: false
    tty: false

  whatsapp-nbn-baileys:
    build:
      context: ./baileys
      dockerfile: Dockerfile
    container_name: whatsapp-nbn-baileys
    restart: unless-stopped
    environment:
      - PYTHON_LOOKUP_URL=http://whatsapp-nbn-lookup-bot:8000/lookup
      - BAILEYS_AUTH_DIR=/app/auth
    volumes:
      - baileys-auth:/app/auth
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  analytics:
    driver: local
  bot-logs:
    driver: local
  baileys-auth:
    driver: local
