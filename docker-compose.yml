version: '3.8'

services:
  whatsapp-todoist-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yambabroadband-whatsapp-todoist
    restart: unless-stopped
    ports:
      - "8001:8000"

    # Environment variables from Portainer
    environment:
      # Todoist API
      - TODOIST_API_TOKEN

      # Twilio WhatsApp
      - TWILIO_ACCOUNT_SID
      - TWILIO_AUTH_TOKEN
      - TWILIO_WHATSAPP_NUMBER

      # AI Models
      - OPENAI_API_KEY
      - OPENROUTER_API_KEY
      - MODEL_PROVIDER
      - MODEL_NAME

      # Legacy NBN bot credentials (if needed)
      - TELEGRAM_BOT_TOKEN
      - IPERIUM_EMAIL
      - IPERIUM_PASSWORD
      - GOOGLE_MAPS_API_KEY

    # Persist analytics and bot logs
    volumes:
      - analytics:/mnt/apps/yambabroadband/analytics
      - bot-logs:/var/log/yambabroadband


    # Resource limits
    mem_limit: 256m
    memswap_limit: 256m
    cpus: '0.5'

    # Logging - captures stdout/stderr, rotates automatically
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Keep container responsive to signals
    stdin_open: false
    tty: false

volumes:
  analytics:
    driver: local
  bot-logs:
    driver: local
