version: '3.8'

services:
  whatsapp-todoist-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yambabroadband-whatsapp-todoist
    restart: unless-stopped
    ports:
      - "8001:8000"

    # Environment variables from Portainer
    # Required API credentials:
    # - TODOIST_API_TOKEN from todoist.com/prefs/integrations
    # - OPENAI_API_KEY from platform.openai.com/api-keys
    # - WHATSAPP_SESSION_PATH (optional, defaults to ./auth)
    environment:
      # Todoist API
      - TODOIST_API_TOKEN

      # AI Models
      - OPENAI_API_KEY
      - OPENROUTER_API_KEY
      - MODEL_PROVIDER
      - MODEL_NAME

      # WhatsApp Session
      - WHATSAPP_SESSION_PATH=/app/auth

      # Redis (optional - for conversation context)
      - REDIS_URL

      # Legacy NBN bot credentials (if needed)
      - TELEGRAM_BOT_TOKEN
      - IPERIUM_EMAIL
      - IPERIUM_PASSWORD
      - GOOGLE_MAPS_API_KEY

    # Persist WhatsApp auth session and analytics
    volumes:
      - whatsapp-auth:/app/auth
      - analytics:/mnt/apps/yambabroadband/analytics
      - bot-logs:/var/log/yambabroadband


    # Resource limits
    mem_limit: 512m
    memswap_limit: 512m
    cpus: '0.5'

    # Logging - captures stdout/stderr, rotates automatically
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Keep container running with WhatsApp connection
    stdin_open: true
    tty: true

volumes:
  whatsapp-auth:
    driver: local
  analytics:
    driver: local
  bot-logs:
    driver: local